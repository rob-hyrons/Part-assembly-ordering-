<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axle Configurator | SWS UK</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stable PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0077c8;
            --border-color: #dee2e6;
            --text-dark: #333;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        .config-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 10px;
        }

        h1 { font-weight: 300; font-size: 24px; margin: 0; color: var(--primary-blue); }
        h1 span { font-weight: 600; color: var(--primary-blue); }
        .brand { font-weight: 800; color: #a31d24; font-size: 18px; }

        .section-label {
            display: block;
            font-weight: 700;
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .selection-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: white;
            transition: 0.2s;
        }

        .selection-card.active {
            border-color: var(--primary-blue);
            background-color: rgba(0, 119, 200, 0.05);
        }

        .selection-card i { font-size: 20px; color: #999; margin-bottom: 8px; display: block; }
        .selection-card.active i { color: var(--primary-blue); }
        .selection-card h3 { margin: 0; font-size: 14px; line-height: 1.4; }
        .selection-card span { font-size: 11px; font-weight: normal; color: #777; display: block; margin-top: 2px; }

        .sub-step, .config-step-wrapper {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 25px;
            margin-top: 20px;
        }

        .split-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .select-wrapper { position: relative; }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            appearance: none;
            background: white;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #aaa; pointer-events: none; font-size: 12px;
        }

        .dimension-group {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-item { display: flex; flex-direction: column; }
        .input-wrapper {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            overflow: hidden;
        }

        .input-wrapper input { border: none; padding: 10px; flex: 1; outline: none; font-size: 14px; width: 100%; }
        .unit-label { background: #eee; padding: 10px 12px; border-left: 1px solid var(--border-color); color: #666; font-weight: 600; font-size: 12px; min-width: 35px; text-align: center; }

        .conditional-input { display: none; }

        .image-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            height: 380px; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        #preview-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }

        .btn-pdf {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-pdf:hover { background-color: #0056a0; }
    </style>
</head>
<body>

    <div class="config-container" id="main-app">
        <header>
            <h1>Axle <span>Configurator</span></h1>
            <div class="brand">SWS UK</div>
        </header>

        <!-- Step 1 -->
        <label class="section-label">1. Select Application Category</label>
        <div class="selection-grid" id="main-cats">
            <div class="selection-card" id="cat-traditional" onclick="selectCategory('traditional')">
                <i class="fa-solid fa-house-user"></i>
                <h3>Traditional</h3>
                <span>(Tubular Motor)</span>
            </div>
            <div class="selection-card" id="cat-industrial" onclick="selectCategory('industrial')">
                <i class="fa-solid fa-industry"></i>
                <h3>Industrial</h3>
                <span>(Outboard Motor)</span>
            </div>
        </div>

        <!-- Step 2 (Conditional Industrial) -->
        <div id="drive-type-step" class="sub-step">
            <label class="section-label">2. Drive Type</label>
            <div class="selection-grid" id="drive-cats">
                <div class="selection-card" id="type-direct" onclick="selectDriveType('direct')">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>Direct Drive</h3>
                </div>
                <div class="selection-card" id="type-indirect" onclick="selectDriveType('indirect')">
                    <i class="fa-solid fa-gears"></i>
                    <h3>Indirect Drive</h3>
                </div>
            </div>
        </div>

        <!-- Step 3: Detailed Config -->
        <div id="config-ui" class="config-step-wrapper">
            <div class="split-layout">
                <div class="config-pane">
                    <label class="section-label" id="dropdown-label">3. Selection</label>
                    <div class="select-wrapper" style="margin-bottom: 20px;">
                        <select id="config-dropdown" onchange="handleSelectionChange()"></select>
                    </div>

                    <div class="dimension-group">
                        <!-- Width -->
                        <div class="input-item">
                            <label class="section-label">Dimension Width</label>
                            <div class="input-wrapper">
                                <input type="number" id="input-width" placeholder="0.00">
                                <div class="unit-label">mm</div>
                            </div>
                        </div>

                        <!-- Barrel Size -->
                        <div class="input-item">
                            <label class="section-label">Barrel Size (Imperial / Metric)</label>
                            <div class="select-wrapper">
                                <select id="select-barrel">
                                    <option value="" disabled selected>Select barrel size...</option>
                                    <option>4" (101.6mm) 16g (1.6mm)</option>
                                    <option>4" (101.6mm) 10g (3.2mm)</option>
                                    <option>5" (127.0mm) 10g (3.2mm)</option>
                                    <option>5.5" (139.7mm) 6g (4.8mm)</option>
                                    <option>6 5/8" (168.3mm) 6g (4.8mm)</option>
                                    <option>7 5/8" (193.7mm) 3g (6.4mm)</option>
                                </select>
                            </div>
                        </div>

                        <!-- Shaft Size: Conditional Industrial -->
                        <div class="input-item conditional-input" id="box-shaft">
                            <label class="section-label">Shaft Size</label>
                            <div class="select-wrapper">
                                <select id="select-shaft">
                                    <option value="" disabled selected>Select shaft size...</option>
                                    <option>25.4mm</option>
                                    <option>30mm</option>
                                    <option>40mm</option>
                                    <option>55mm</option>
                                </select>
                            </div>
                        </div>

                        <!-- Motor Spec: Conditional -->
                        <div class="input-item conditional-input" id="box-motor">
                            <label class="section-label">Motor Specification</label>
                            <div class="input-wrapper">
                                <input type="text" id="input-motor" placeholder="Type motor specification...">
                            </div>
                        </div>

                        <!-- Control Panel: Conditional -->
                        <div class="input-item conditional-input" id="box-control-panel">
                            <label class="section-label">Control Panel</label>
                            <div class="select-wrapper">
                                <select id="select-control-panel">
                                    <option value="" disabled selected>Select control panel...</option>
                                    <option>TS971</option>
                                    <option>TS959</option>
                                    <option>No Panel Required</option>
                                </select>
                            </div>
                        </div>

                        <!-- End Plate Size: Dynamic Dropdown -->
                        <div class="input-item conditional-input" id="box-plate">
                            <label class="section-label">End Plate Size</label>
                            <div class="select-wrapper">
                                <select id="select-plate">
                                    <option value="" disabled selected>Select size...</option>
                                    <!-- Dynamic increments injected here -->
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="preview-pane">
                    <label class="section-label">Visual Reference</label>
                    <div class="image-box">
                        <img id="preview-img" src="" alt="Axle Preview">
                        <span id="placeholder-text" style="color:#999; font-style:italic; font-size: 13px;">Select option to preview...</span>
                    </div>
                </div>
            </div>

            <div style="text-align: right;" id="pdf-button-container">
                <button class="btn-pdf" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Download PDF Report
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = '';

        const data = {
            traditional: [
                { text: "Axle and dummy end only", file: "trad-ax.svg" },
                { text: "Axle dummy end with motor", file: "trad-ax-m.svg" },
                { text: "Axle dummy end, motor, and end plates", file: "trad-ax-m-e.svg" }
            ],
            direct: [
                { text: "Axle only with shafts", file: "ind-dd-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-dd-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-dd-ax-e-m.svg" }
            ],
            indirect: [
                { text: "Axle only with shafts", file: "ind-id-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-id-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-id-ax-e-m.svg" }
            ]
        };

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('#main-cats .selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            document.getElementById('config-ui').style.display = 'none';
            document.getElementById('drive-type-step').style.display = 'none';

            if (cat === 'traditional') {
                loadDropdown('traditional');
                document.getElementById('config-ui').style.display = 'block';
                document.getElementById('dropdown-label').textContent = "2. Selection";
            } else {
                document.getElementById('drive-type-step').style.display = 'block';
            }
        }

        function selectDriveType(type) {
            document.querySelectorAll('#drive-cats .selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('type-' + type).classList.add('active');
            loadDropdown(type);
            document.getElementById('config-ui').style.display = 'block';
            document.getElementById('dropdown-label').textContent = "3. Selection";
        }

        function loadDropdown(key) {
            const dropdown = document.getElementById('config-dropdown');
            dropdown.innerHTML = '<option value="" disabled selected>Select option...</option>';
            data[key].forEach(opt => {
                let el = document.createElement("option");
                el.textContent = opt.text;
                el.value = opt.file;
                dropdown.appendChild(el);
            });
            resetInputsAndPreview();
        }

        function resetInputsAndPreview() {
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('placeholder-text').style.display = 'block';
            document.querySelectorAll('.conditional-input').forEach(box => box.style.display = 'none');
            document.getElementById('select-barrel').selectedIndex = 0;
            document.getElementById('select-shaft').selectedIndex = 0;
            document.getElementById('select-control-panel').selectedIndex = 0;
            document.getElementById('select-plate').selectedIndex = 0;
        }

        function handleSelectionChange() {
            const dropdown = document.getElementById('config-dropdown');
            if(!dropdown.value) return;

            const selectedText = dropdown.options[dropdown.selectedIndex].text.toLowerCase();
            
            // Preview
            const img = document.getElementById('preview-img');
            img.src = dropdown.value; 
            img.style.display = 'block';
            document.getElementById('placeholder-text').style.display = 'none';

            // Elements
            const shaftBox = document.getElementById('box-shaft');
            const motorBox = document.getElementById('box-motor');
            const plateBox = document.getElementById('box-plate');
            const controlBox = document.getElementById('box-control-panel');
            const plateDropdown = document.getElementById('select-plate');

            const hasMotor = selectedText.includes('motor');
            const hasPlate = selectedText.includes('plate');

            // 1. Shaft Logic
            shaftBox.style.display = (currentCategory === 'industrial' && !hasMotor) ? 'flex' : 'none';

            // 2. Motor Logic
            motorBox.style.display = hasMotor ? 'flex' : 'none';

            // 3. Control Panel Logic
            controlBox.style.display = (currentCategory === 'industrial' && hasMotor) ? 'flex' : 'none';
            
            // 4. End Plate Logic (Dynamic Range)
            if (hasPlate) {
                plateBox.style.display = 'flex';
                plateDropdown.innerHTML = '<option value="" disabled selected>Select size...</option>';
                
                const max = (currentCategory === 'traditional') ? 450 : 550;
                for (let i = 300; i <= max; i += 50) {
                    let opt = document.createElement("option");
                    opt.textContent = i + " mm";
                    opt.value = i;
                    plateDropdown.appendChild(opt);
                }
            } else {
                plateBox.style.display = 'none';
            }
        }

        function generatePDF() {
            const element = document.getElementById('main-app');
            const widthValue = document.getElementById('input-width').value || "0000";

            const opt = {
                margin:       [10, 10, 10, 10],
                filename:     `Axle-Config-${widthValue}mm.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    letterRendering: true,
                    windowWidth: 1200 
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                ignoreElements: (el) => el.id === 'pdf-button-container'
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
