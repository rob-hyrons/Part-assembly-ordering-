<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axle Configurator | SWS UK</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0077c8;
            --border-color: #dee2e6;
            --text-dark: #333;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .config-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }

        h1 {
            font-weight: 300;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        h1 span { font-weight: 600; color: var(--primary-blue); }

        .section-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .selection-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .selection-card.active {
            border-color: var(--primary-blue);
            background-color: rgba(0, 119, 200, 0.05);
        }

        .selection-card i { font-size: 24px; color: #999; margin-bottom: 10px; display: block; }
        .selection-card.active i { color: var(--primary-blue); }

        .sub-step, .config-step-wrapper {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 30px;
            margin-top: 20px;
        }

        .split-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .config-pane, .preview-pane { width: 50%; }

        .select-wrapper { position: relative; margin-bottom: 30px; }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: white;
            appearance: none;
        }

        .select-wrapper::after {
            content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #aaa; pointer-events: none;
        }

        .dimension-group {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .input-wrapper {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            max-width: 250px;
        }

        .input-wrapper input { border: none; padding: 12px; flex: 1; outline: none; }
        .unit-label { background: #eee; padding: 12px 15px; border-left: 1px solid var(--border-color); color: #666; font-weight: 600; }

        .image-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #preview-img { max-width: 100%; height: auto; display: none; }

        .btn-pdf {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 30px;
        }

        /* Print styling to ensure PDF looks clean */
        @media print {
            .btn-pdf, .selection-grid i { display: none !important; }
            body { background: white; padding: 0; }
            .config-container { box-shadow: none; border: none; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="config-container" id="capture-area">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Axle <span>Configurator</span></h1>
            <div style="font-weight: 800; color: #a31d24;">SWS UK</div>
        </div>

        <!-- Step 1 -->
        <label class="section-label">1. Application Category</label>
        <div class="selection-grid" id="step-1-grid">
            <div class="selection-card" id="cat-traditional" onclick="selectCategory('traditional')">
                <i class="fa-solid fa-house-user"></i>
                <h3>Traditional</h3>
            </div>
            <div class="selection-card" id="cat-industrial" onclick="selectCategory('industrial')">
                <i class="fa-solid fa-industry"></i>
                <h3>Industrial</h3>
            </div>
        </div>

        <!-- Industrial Sub-Step -->
        <div id="drive-type-step" class="sub-step">
            <label class="section-label">2. Drive Type</label>
            <div class="selection-grid">
                <div class="selection-card" id="type-direct" onclick="selectDriveType('direct')">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>Direct Drive</h3>
                </div>
                <div class="selection-card" id="type-indirect" onclick="selectDriveType('indirect')">
                    <i class="fa-solid fa-gears"></i>
                    <h3>Indirect Drive</h3>
                </div>
            </div>
        </div>

        <!-- Configuration UI -->
        <div id="config-ui" class="config-step-wrapper">
            <div class="split-layout">
                <div class="config-pane">
                    <label class="section-label" id="dropdown-label">3. Selection</label>
                    <div class="select-wrapper">
                        <select id="config-dropdown" onchange="updateImage()">
                        </select>
                    </div>

                    <div class="dimension-group">
                        <label class="section-label">4. Dimension Width</label>
                        <div class="input-wrapper">
                            <input type="number" id="input-width" placeholder="0000">
                            <div class="unit-label">mm</div>
                        </div>
                    </div>
                </div>

                <div class="preview-pane">
                    <label class="section-label">Visual Reference</label>
                    <div class="image-box">
                        <img id="preview-img" src="" alt="Axle Preview">
                        <span id="placeholder-text" style="color:#999; font-style:italic">Select an option...</span>
                    </div>
                </div>
            </div>

            <div style="text-align: right;">
                <button class="btn-pdf" id="export-btn" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Download PDF Report
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentCategory = '';
        let currentDriveType = '';

        const data = {
            traditional: [
                { text: "Axle and dummy end only", file: "trad-ax.svg" },
                { text: "Axle dummy end with motor", file: "trad-ax-m.svg" },
                { text: "Axle dummy end, motor, and end plates", file: "trad-ax-m-e.svg" }
            ],
            direct: [
                { text: "Axle only with shafts", file: "ind-dd-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-dd-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-dd-ax-e-m.svg" }
            ],
            indirect: [
                { text: "Axle only with shafts", file: "ind-id-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-id-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-id-ax-e-m.svg" }
            ]
        };

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('#step-1-grid .selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            document.getElementById('config-ui').style.display = 'none';
            document.getElementById('drive-type-step').style.display = 'none';

            if (cat === 'traditional') {
                currentDriveType = '';
                loadDropdown('traditional');
                document.getElementById('config-ui').style.display = 'block';
                document.getElementById('dropdown-label').textContent = "2. Selection";
            } else {
                document.getElementById('drive-type-step').style.display = 'block';
            }
        }

        function selectDriveType(type) {
            currentDriveType = type;
            document.getElementById('type-direct').classList.remove('active');
            document.getElementById('type-indirect').classList.remove('active');
            document.getElementById('type-' + type).classList.add('active');
            loadDropdown(type);
            document.getElementById('config-ui').style.display = 'block';
            document.getElementById('dropdown-label').textContent = "3. Selection";
        }

        function loadDropdown(key) {
            const dropdown = document.getElementById('config-dropdown');
            dropdown.innerHTML = '<option value="" disabled selected>Select option...</option>';
            data[key].forEach(opt => {
                let el = document.createElement("option");
                el.textContent = opt.text;
                el.value = opt.file;
                dropdown.appendChild(el);
            });
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('placeholder-text').style.display = 'block';
        }

        function updateImage() {
            const dropdown = document.getElementById('config-dropdown');
            const img = document.getElementById('preview-img');
            img.src = dropdown.value; 
            img.style.display = 'block';
            document.getElementById('placeholder-text').style.display = 'none';
        }

        function generatePDF() {
            const btn = document.getElementById('export-btn');
            const element = document.getElementById('capture-area');
            
            // Hide button so it doesn't appear in PDF
            btn.style.display = 'none';

            const opt = {
                margin:       10,
                filename:     'Axle-Configuration.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate
            html2pdf().set(opt).from(element).save().then(() => {
                btn.style.display = 'inline-flex'; // Bring button back
            }).catch(err => {
                console.error(err);
                btn.style.display = 'inline-flex';
                // Fallback if library fails
                window.print();
            });
        }
    </script>
</body>
</html>
