<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axle Configurator | SWS UK</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0077c8;
            --border-color: #dee2e6;
            --text-dark: #333;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .config-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 300;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        h1 span { font-weight: 600; color: var(--primary-blue); }

        .section-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Step 1 Selection Cards */
        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .selection-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .selection-card:hover { background-color: #fafafa; border-color: #ccc; }
        .selection-card.active {
            border-color: var(--primary-blue);
            background-color: rgba(0, 119, 200, 0.03);
        }

        .selection-card i { font-size: 24px; color: #999; margin-bottom: 10px; display: block; }
        .selection-card.active i { color: var(--primary-blue); }
        .selection-card h3 { margin: 0; font-size: 16px; }

        /* Hidden Sections */
        .sub-step, .config-step-wrapper {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 30px;
            margin-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        /* Split Layout 50/50 */
        .split-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .config-pane, .preview-pane { width: 50%; }

        /* Select Styling */
        .select-wrapper { position: relative; margin-bottom: 30px; }
        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: white;
            appearance: none;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #aaa; pointer-events: none;
        }

        /* Dimension Input Group */
        .dimension-group {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .input-wrapper {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            max-width: 250px;
        }

        .input-wrapper input { border: none; padding: 12px; flex: 1; outline: none; font-size: 15px; }
        .unit-label { background: #eee; padding: 12px 15px; border-left: 1px solid var(--border-color); color: #666; font-weight: 600; font-size: 13px; }

        /* Preview Box */
        .image-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #preview-img { max-width: 100%; height: auto; max-height: 220px; display: none; }
        .placeholder-msg { color: #999; font-style: italic; font-size: 14px; text-align: center; }

        /* Submit Button */
        .submit-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }

        .btn-pdf {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-pdf:hover { background-color: #0056a0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hidden Template for PDF */
        #pdf-export-content { display: none; padding: 40px; }
    </style>
</head>
<body>

    <div class="config-container">
        <h1>Axle <span>Configurator</span></h1>

        <!-- Step 1: Main Category -->
        <label class="section-label">1. Select Application Category</label>
        <div class="selection-grid">
            <div class="selection-card" id="cat-traditional" onclick="selectCategory('traditional')">
                <i class="fa-solid fa-house-user"></i>
                <h3>Traditional</h3>
            </div>
            <div class="selection-card" id="cat-industrial" onclick="selectCategory('industrial')">
                <i class="fa-solid fa-industry"></i>
                <h3>Industrial</h3>
            </div>
        </div>

        <!-- Step 1.5: Industrial Drive Type -->
        <div id="drive-type-step" class="sub-step">
            <label class="section-label">2. Select Drive Type</label>
            <div class="selection-grid">
                <div class="selection-card" id="type-direct" onclick="selectDriveType('direct')">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>Direct Drive</h3>
                </div>
                <div class="selection-card" id="type-indirect" onclick="selectDriveType('indirect')">
                    <i class="fa-solid fa-gears"></i>
                    <h3>Indirect Drive</h3>
                </div>
            </div>
        </div>

        <!-- Step 2: Configuration UI -->
        <div id="config-ui" class="config-step-wrapper">
            <div class="split-layout">
                <div class="config-pane">
                    <label class="section-label" id="dropdown-label">3. Select Configuration</label>
                    <div class="select-wrapper">
                        <select id="config-dropdown" onchange="updateImage()">
                            <!-- JS Injection -->
                        </select>
                    </div>

                    <div class="dimension-group">
                        <label class="section-label">4. Dimension Width</label>
                        <div class="input-wrapper">
                            <input type="number" id="input-width" placeholder="Enter width...">
                            <div class="unit-label">mm</div>
                        </div>
                    </div>
                </div>

                <div class="preview-pane">
                    <label class="section-label">Visual Reference</label>
                    <div class="image-box">
                        <div id="placeholder" class="placeholder-msg">Select an option to view graphic</div>
                        <img id="preview-img" src="" alt="Axle Preview">
                    </div>
                </div>
            </div>

            <!-- Export Button -->
            <div class="submit-section">
                <button class="btn-pdf" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Export Configuration PDF
                </button>
            </div>
        </div>
    </div>

    <!-- This hidden div is used to build the PDF report -->
    <div id="pdf-export-content"></div>

    <script>
        let currentCategory = '';
        let currentDriveType = '';

        const data = {
            traditional: [
                { text: "Axle and dummy end only", file: "trad-ax.svg" },
                { text: "Axle dummy end with motor", file: "trad-ax-m.svg" },
                { text: "Axle dummy end, motor, and end plates", file: "trad-ax-m-e.svg" }
            ],
            direct: [
                { text: "Axle only with shafts", file: "ind-dd-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-dd-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-dd-ax-e-m.svg" }
            ],
            indirect: [
                { text: "Axle only with shafts", file: "ind-id-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-id-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-id-ax-e-m.svg" }
            ]
        };

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            document.getElementById('config-ui').style.display = 'none';
            document.getElementById('drive-type-step').style.display = 'none';

            if (cat === 'traditional') {
                currentDriveType = '';
                loadDropdown('traditional');
                document.getElementById('config-ui').style.display = 'block';
                document.getElementById('dropdown-label').textContent = "2. Select Configuration";
            } else {
                document.getElementById('drive-type-step').style.display = 'block';
            }
        }

        function selectDriveType(type) {
            currentDriveType = type;
            document.getElementById('type-direct').classList.remove('active');
            document.getElementById('type-indirect').classList.remove('active');
            document.getElementById('type-' + type).classList.add('active');
            loadDropdown(type);
            document.getElementById('config-ui').style.display = 'block';
            document.getElementById('dropdown-label').textContent = "3. Select Configuration";
        }

        function loadDropdown(key) {
            const dropdown = document.getElementById('config-dropdown');
            dropdown.innerHTML = '<option value="" disabled selected>Please select an option...</option>';
            data[key].forEach(opt => {
                let el = document.createElement("option");
                el.textContent = opt.text;
                el.value = opt.file;
                dropdown.appendChild(el);
            });
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
        }

        function updateImage() {
            const dropdown = document.getElementById('config-dropdown');
            const img = document.getElementById('preview-img');
            const placeholder = document.getElementById('placeholder');
            if (dropdown.value) {
                img.src = dropdown.value; 
                img.style.display = 'block';
                placeholder.style.display = 'none';
            }
        }

        function generatePDF() {
            const width = document.getElementById('input-width').value;
            const dropdown = document.getElementById('config-dropdown');
            const selectionText = dropdown.options[dropdown.selectedIndex].text;
            const imgSrc = document.getElementById('preview-img').src;

            if (!width || !dropdown.value) {
                alert("Please complete the configuration and dimension before exporting.");
                return;
            }

            // Construct the PDF HTML content
            const pdfHTML = `
                <div style="font-family: 'Open Sans', sans-serif; color: #333;">
                    <div style="border-bottom: 2px solid #0077c8; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
                        <h1 style="margin:0; font-size: 24px; color: #444;">Axle Configuration <span style="color: #0077c8;">Technical Data</span></h1>
                        <div style="font-weight: bold; color: #a31d24;">SWS UK</div>
                    </div>
                    
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 40px;">
                        <tr>
                            <td style="padding: 10px; border: 1px solid #eee; background: #f9f9f9; width: 40%; font-weight: bold;">Application Category:</td>
                            <td style="padding: 10px; border: 1px solid #eee;">${currentCategory.toUpperCase()}</td>
                        </tr>
                        ${currentDriveType ? `
                        <tr>
                            <td style="padding: 10px; border: 1px solid #eee; background: #f9f9f9; font-weight: bold;">Drive System:</td>
                            <td style="padding: 10px; border: 1px solid #eee;">${currentDriveType.toUpperCase()} DRIVE</td>
                        </tr>` : ''}
                        <tr>
                            <td style="padding: 10px; border: 1px solid #eee; background: #f9f9f9; font-weight: bold;">Assembly Configuration:</td>
                            <td style="padding: 10px; border: 1px solid #eee;">${selectionText}</td>
                        </tr>
                        <tr>
                            <td style="padding: 10px; border: 1px solid #eee; background: #f9f9f9; font-weight: bold;">Requested Width:</td>
                            <td style="padding: 10px; border: 1px solid #eee; font-size: 18px; color: #0077c8;"><strong>${width} mm</strong></td>
                        </tr>
                    </table>

                    <div style="text-align: center; border: 1px solid #ddd; padding: 20px;">
                        <div style="font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase;">Technical Illustration</div>
                        <img src="${imgSrc}" style="width: 100%; max-height: 300px;">
                    </div>

                    <div style="margin-top: 50px; font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 10px;">
                        Generated via SWS UK Axle Configurator | ${new Date().toLocaleString()}
                    </div>
                </div>
            `;

            const pdfArea = document.getElementById('pdf-export-content');
            pdfArea.innerHTML = pdfHTML;

            const opt = {
                margin:       15,
                filename:     `Axle-Config-${width}mm.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, logging: false, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Run generation
            html2pdf().from(pdfArea).set(opt).save();
        }
    </script>

</body>
</html>
