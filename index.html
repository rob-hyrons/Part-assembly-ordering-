<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axle Configurator | SWS UK</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #0077c8;
            --border-color: #dee2e6;
            --text-dark: #333;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        /* Fixed width container for consistent scaling */
        .config-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 10px;
        }

        h1 {
            font-weight: 300;
            font-size: 24px;
            margin: 0;
        }

        h1 span { font-weight: 600; color: var(--primary-blue); }

        .section-label {
            display: block;
            font-weight: 700;
            font-size: 12px;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .selection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .selection-card {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .selection-card.active {
            border-color: var(--primary-blue);
            background-color: rgba(0, 119, 200, 0.05);
        }

        .selection-card i { font-size: 20px; color: #999; margin-bottom: 8px; display: block; }
        .selection-card.active i { color: var(--primary-blue); }
        .selection-card h3 { margin: 0; font-size: 14px; }

        .sub-step, .config-step-wrapper {
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 20px;
            margin-top: 15px;
        }

        .split-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .config-pane, .preview-pane { width: 50%; }

        .select-wrapper { position: relative; margin-bottom: 20px; }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            appearance: none;
            background: white;
        }

        .select-wrapper::after {
            content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: #aaa; pointer-events: none; font-size: 10px;
        }

        .dimension-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .input-wrapper {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            max-width: 200px;
        }

        .input-wrapper input { border: none; padding: 10px; flex: 1; outline: none; width: 100%; font-size: 14px; }
        .unit-label { background: #eee; padding: 10px 12px; border-left: 1px solid var(--border-color); color: #666; font-weight: 600; font-size: 12px; }

        /* IMAGE SCALING FIXES */
        .image-box {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            height: 220px; /* Fixed height for consistent PDF layout */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow: hidden;
        }

        #preview-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; /* Ensures the image fits without stretching or clipping */
            display: none; 
        }

        .btn-pdf {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Hide elements from the capture */
        .no-export { display: none !important; }
    </style>
</head>
<body>

    <div class="config-container" id="pdf-content">
        <header>
            <h1>Axle <span>Configurator</span></h1>
            <div style="font-weight: 800; color: #a31d24; font-size: 18px;">SWS UK</div>
        </header>

        <!-- Step 1 -->
        <div id="step-1-area">
            <label class="section-label">1. Application Category</label>
            <div class="selection-grid" id="main-cats">
                <div class="selection-card" id="cat-traditional" onclick="selectCategory('traditional')">
                    <i class="fa-solid fa-house-user"></i>
                    <h3>Traditional</h3>
                </div>
                <div class="selection-card" id="cat-industrial" onclick="selectCategory('industrial')">
                    <i class="fa-solid fa-industry"></i>
                    <h3>Industrial</h3>
                </div>
            </div>
        </div>

        <!-- Industrial Sub-Step -->
        <div id="drive-type-step" class="sub-step">
            <label class="section-label">2. Drive Type</label>
            <div class="selection-grid" id="drive-cats">
                <div class="selection-card" id="type-direct" onclick="selectDriveType('direct')">
                    <i class="fa-solid fa-bolt"></i>
                    <h3>Direct Drive</h3>
                </div>
                <div class="selection-card" id="type-indirect" onclick="selectDriveType('indirect')">
                    <i class="fa-solid fa-gears"></i>
                    <h3>Indirect Drive</h3>
                </div>
            </div>
        </div>

        <!-- Configuration UI -->
        <div id="config-ui" class="config-step-wrapper">
            <div class="split-layout">
                <div class="config-pane">
                    <label class="section-label" id="dropdown-label">3. Selection</label>
                    <div class="select-wrapper">
                        <select id="config-dropdown" onchange="updateImage()">
                        </select>
                    </div>

                    <div class="dimension-group">
                        <label class="section-label">4. Dimension Width</label>
                        <div class="input-wrapper">
                            <input type="number" id="input-width" placeholder="0000">
                            <div class="unit-label">mm</div>
                        </div>
                    </div>
                </div>

                <div class="preview-pane">
                    <label class="section-label">Visual Reference</label>
                    <div class="image-box">
                        <img id="preview-img" src="" alt="Axle Preview">
                        <span id="placeholder-text" style="color:#999; font-style:italic; font-size: 13px;">Select configuration...</span>
                    </div>
                </div>
            </div>

            <div style="text-align: right;" id="btn-container">
                <button class="btn-pdf" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Download PDF Report
                </button>
            </div>
        </div>
        
        <div id="footer-info" style="display:none; margin-top: 20px; font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 10px;">
            Technical specification generated on <span id="date-stamp"></span>
        </div>
    </div>

    <script>
        let currentCategory = '';
        let currentDriveType = '';

        const data = {
            traditional: [
                { text: "Axle and dummy end only", file: "trad-ax.svg" },
                { text: "Axle dummy end with motor", file: "trad-ax-m.svg" },
                { text: "Axle dummy end, motor, and end plates", file: "trad-ax-m-e.svg" }
            ],
            direct: [
                { text: "Axle only with shafts", file: "ind-dd-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-dd-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-dd-ax-e-m.svg" }
            ],
            indirect: [
                { text: "Axle only with shafts", file: "ind-id-ax.svg" },
                { text: "Axle with end plates and bearings", file: "ind-id-ax-e.svg" },
                { text: "Axle, end plates, bearings and motor", file: "ind-id-ax-e-m.svg" }
            ]
        };

        function selectCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('#main-cats .selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('cat-' + cat).classList.add('active');
            document.getElementById('config-ui').style.display = 'none';
            document.getElementById('drive-type-step').style.display = 'none';

            if (cat === 'traditional') {
                currentDriveType = '';
                loadDropdown('traditional');
                document.getElementById('config-ui').style.display = 'block';
                document.getElementById('dropdown-label').textContent = "2. Selection";
            } else {
                document.getElementById('drive-type-step').style.display = 'block';
            }
        }

        function selectDriveType(type) {
            currentDriveType = type;
            document.querySelectorAll('#drive-cats .selection-card').forEach(c => c.classList.remove('active'));
            document.getElementById('type-' + type).classList.add('active');
            loadDropdown(type);
            document.getElementById('config-ui').style.display = 'block';
            document.getElementById('dropdown-label').textContent = "3. Selection";
        }

        function loadDropdown(key) {
            const dropdown = document.getElementById('config-dropdown');
            dropdown.innerHTML = '<option value="" disabled selected>Select option...</option>';
            data[key].forEach(opt => {
                let el = document.createElement("option");
                el.textContent = opt.text;
                el.value = opt.file;
                dropdown.appendChild(el);
            });
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('placeholder-text').style.display = 'block';
        }

        function updateImage() {
            const dropdown = document.getElementById('config-dropdown');
            const img = document.getElementById('preview-img');
            img.src = dropdown.value; 
            img.style.display = 'block';
            document.getElementById('placeholder-text').style.display = 'none';
        }

        function generatePDF() {
            const element = document.getElementById('pdf-content');
            const btnContainer = document.getElementById('btn-container');
            const footer = document.getElementById('footer-info');
            const dateStamp = document.getElementById('date-stamp');

            // Pre-process for clean PDF
            btnContainer.classList.add('no-export');
            footer.style.display = 'block';
            dateStamp.textContent = new Date().toLocaleString();

            const opt = {
                margin:       [10, 10],
                filename:     'Axle-Specification.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { 
                    scale: 3, // High resolution
                    useCORS: true, 
                    logging: false,
                    windowWidth: 900 // Force the browser to render at the container's ideal width
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Generate
            html2pdf().set(opt).from(element).save().then(() => {
                // Post-process: Reset UI
                btnContainer.classList.remove('no-export');
                footer.style.display = 'none';
            });
        }
    </script>
</body>
</html>
